allowBuilds:
  "@biomejs/biome": true
  "@swc/core": true
  core-js: false
  core-js-pure: false
  lefthook: true

blockExoticSubdeps: true

minimumReleaseAge: 1440 # 1 day

overrides:
  serialize-javascript@<=7.0.2: ^7.0.3
  serialize-javascript@>=5.0.0 <7.0.5: ^7.0.5
  uuid@<11.1.1: ^11.1.1

trustPolicy: no-downgrade

trustPolicyExclude:
  - detect-port@1.6.1
  - semver@6.3.1
